services:
  postgres:
    image: postgres:16-alpine
    container_name: 333dmo-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dmo
      POSTGRES_PASSWORD: dmo_secret
      POSTGRES_DB: 333dmo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dmo -d 333dmo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 333dmo-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: 333dmo-server
    ports:
      - '3100:3100'
    environment:
      DATABASE_URL: postgresql://dmo:dmo_secret@postgres:5432/333dmo
      REDIS_URL: redis://redis:6379
      PORT: 3100
      HOST: 0.0.0.0
      NODE_ENV: production
      API_KEY: ${API_KEY:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: 333dmo-web
    ports:
      - '8080:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
